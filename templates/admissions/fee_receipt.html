<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="../../../static/admissions/css/fee/receipt.css"> -->
<style>
body{
    font-family: Arial, sans-serif;
    color:#333;
}

.receipt-container{
    padding:30px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

h1{
    color:#0d6efd;
    margin:0;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.details-table{
    width:100%;
    border-collapse:collapse;
}

.details-table td{
    border:1px solid #ccc;
    padding:12px;
}

.details-table td:first-child{
    font-weight:bold;
    width:40%;
    background:#f5f5f5;
}

.footer{
    margin-top:40px;
    text-align:center;
    font-size:12px;
    color:gray;
}

</style>

</head>

<body>

<div class="receipt-container">

    <div class="header">
        <h1>CSC CRM</h1>
        <p>Training & Admission Center</p>
    </div>

    <h2>PAYMENT RECEIPT</h2>

    <table class="details-table">
        <tr>
            <td>Student Name</td>
            <td>{{ payment.student.first_name }}</td>
        </tr>

        <tr>
            <td>Amount</td>
            <td>₹{{ payment.amount }}</td>
        </tr>

        <tr>
            <td>Payment Mode</td>
            <td>{{ payment.mode }}</td>
        </tr>

        <tr>
            <td>Date</td>
            <td>{{ payment.date }}</td>
        </tr>

        <tr>
            <td>Receipt No</td>
            <td>RCPT-{{ payment.id }}</td>
        </tr>
    </table>

    <div class="footer">
        <p>This is a computer generated receipt.</p>
    </div>

</div>
    
</body>
</html>
